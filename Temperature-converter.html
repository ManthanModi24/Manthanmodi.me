<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Temperature Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="temperature.css">
  <link rel="stylesheet" href="portfolio-theme.css">
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#020617] via-[#020b1c] to-[#020617] text-white theme-page">

  <div class="fixed inset-0 -z-10">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-purple-600/30 rounded-full blur-3xl"></div>
    <div class="absolute top-1/3 -right-40 w-96 h-96 bg-cyan-500/30 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 left-1/3 w-96 h-96 bg-emerald-500/20 rounded-full blur-3xl"></div>
  </div>

  <div class="card w-[90%] max-w-md text-center">

    <h1 class="text-2xl font-bold mb-6">Temperature Converter</h1>

    <input
      id="celsius"
      type="number"
      placeholder="Enter Celsius"
      class="input"
    >

    <button onclick="convert()"
      class="btn">
      Convert to Fahrenheit
    </button>

    <div id="result" class="text-lg text-gray-300"></div>

    <a href="index.html" class="block mt-6 text-blue-400 hover:underline">
      <- Back to Portfolio
    </a>

  </div>

  <script src="temperature.js"></script>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
